<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echomo (에코모) - 소리 수집가</title>
    <style>
        /* 별빛 배경 스타일 */
        body { 
            background: radial-gradient(circle at center, #fcfdfe 0%, #f0f6ff 100%);
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding: 40px 20px; color: #555; 
            position: relative; overflow-x: hidden; 
        }
        @keyframes twinklestar { 
            0%, 100% { opacity: 0; transform: scale(0.5); } 
            50% { opacity: 0.7; transform: scale(1.2); } 
        }
        .star { position: absolute; background-color: #88aaff; border-radius: 50%; animation: twinklestar infinite ease-in-out; z-index: -1; }
        .star1 { width: 3px; height: 3px; top: 15%; left: 10%; animation-duration: 3s; }
        .star2 { width: 5px; height: 5px; top: 30%; left: 80%; animation-duration: 5s; }
        .star3 { width: 2px; height: 2px; top: 60%; left: 20%; animation-duration: 4s; }
        .star4 { width: 4px; height: 4px; top: 80%; left: 70%; animation-duration: 6s; }

        /* 소프트 모찌 카드 스타일 */
        .container { background: white; padding: 60px 45px; border-radius: 50px; box-shadow: 0 25px 50px rgba(136, 170, 255, 0.07); text-align: center; max-width: 680px; width: 100%; position: relative; z-index: 1; }
        h1 { color: #88aaff; font-size: 3.2em; margin-bottom: 8px; letter-spacing: -1.5px; }
        .intro { font-size: 1.2em; color: #8fa0ac; margin-bottom: 55px; }
        @keyframes floatCute { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .character-img { width: 100%; max-width: 320px; border-radius: 40px; margin: 0 auto 60px; display: block; animation: floatCute 5s ease-in-out infinite; box-shadow: 0 10px 25px rgba(136, 170, 255, 0.15); }
        .section { text-align: left; margin-top: 70px; }
        .section h3 { color: #88aaff; background: #f0f6ff; padding: 12px 20px; border-radius: 15px; margin-bottom: 25px; font-size: 1.4em; display: inline-block; }
        .gallery-item { background: #fafcfd; border-radius: 35px; padding: 30px; border: 2px solid #f0f6ff; margin-bottom: 30px; }
        .gallery-item img { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        .audio-player { width: 100%; margin-top: 10px; }
        .tag { background: #f0f6ff; color: #88aaff; padding: 5px 15px; border-radius: 50px; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="star star1"></div><div class="star star2"></div><div class="star star3"></div><div class="star star4"></div>

    <div class="container">
        <h1>Echo-mo</h1>
        <p class="intro">세상의 모든 소리를 음악으로 만드는 감성 수집가</p>
        <img src="echomo.jpg" alt="에코모 메인" class="character-img">

        <div class="section">
            <h3>🎼 소리 갤러리</h3>
            <div class="gallery-item">
                <span class="tag">CITY</span>
                <img src="city.jpg" alt="도시">
                <p><strong>도시의 심장 소리</strong></p>
                <audio class="audio-player" controls>
                    <source src="city.mp3" type="audio/mpeg">
                    <source src="./city.mp3" type="audio/mpeg">
                    <source src="https://seoseocrafter-dot.github.io/2026113388-lee-seobean/city.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="gallery-item">
                <span class="tag">FOREST</span>
                <img src="forest.jpg" alt="숲">
                <p><strong>자연의 자장가</strong></p>
                <audio class="audio-player" controls>
                    <source src="forest.mp3" type="audio/mpeg">
                    <source src="./forest.mp3" type="audio/mpeg">
                    <source src="https://seoseocrafter-dot.github.io/2026113388-lee-seobean/forest.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="gallery-item">
                <span class="tag">RETRO</span>
                <img src="retro.jpg" alt="레트로">
                <p><strong>추억의 메아리</strong></p>
                <audio class="audio-player" controls>
                    <source src="retro.mp3" type="audio/mpeg">
                    <source src="./retro.mp3" type="audio/mpeg">
                    <source src="https://seoseocrafter-dot.github.io/2026113388-lee-seobean/retro.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>
</body>
</html>
