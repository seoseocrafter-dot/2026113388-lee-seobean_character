<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echomo (에코모) - 소리 수집가</title>
    <style>
        /* 1. 배경 설정: 꿈꾸는 파스텔 밤하늘 */
        body { 
            background: linear-gradient(180deg, #e0e9ff 0%, #f7faff 50%, #ffffff 100%);
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; margin: 0; padding: 60px 20px; color: #555; 
            position: relative; overflow-x: hidden; 
        }

        /* 2. 구름 애니메이션 */
        @keyframes cloudFlow {
            0% { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }
        .cloud {
            position: absolute; background: white; border-radius: 100px;
            filter: blur(20px); z-index: 0; opacity: 0.5;
            animation: cloudFlow infinite linear;
        }
        /* 구름 위치와 크기 조절 */
        .c1 { width: 200px; height: 60px; top: 10%; animation-duration: 25s; }
        .c2 { width: 300px; height: 100px; top: 40%; animation-duration: 40s; animation-delay: -5s; }
        .c3 { width: 250px; height: 80px; top: 70%; animation-duration: 35s; animation-delay: -15s; }

        /* 3. 별 반짝임 애니메이션 */
        @keyframes twinkle { 
            0%, 100% { opacity: 0.2; transform: scale(1); } 
            50% { opacity: 1; transform: scale(1.3); } 
        }
        .star { 
            position: absolute; background-color: #88aaff; border-radius: 50%; 
            animation: twinkle infinite ease-in-out; z-index: 0;
        }
        .s1 { width: 6px; height: 6px; top: 15%; left: 10%; animation-duration: 3s; }
        .s2 { width: 8px; height: 8px; top: 5%; left: 85%; animation-duration: 4s; }
        .s3 { width: 5px; height: 5px; top: 60%; left: 5%; animation-duration: 2.5s; }
        .s4 { width: 7px; height: 7px; top: 85%; left: 90%; animation-duration: 5s; }

        /* 4. 메인 카드 디자인 (반투명 유리 효과 추가) */
        .container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); /* 뒤 배경이 살짝 흐릿하게 보이는 세련된 효과 */
            padding: 60px 40px; border-radius: 60px; 
            box-shadow: 0 30px 60px rgba(136, 170, 255, 0.15); 
            text-align: center; max-width: 600px; width: 100%; 
            position: relative; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 { color: #88aaff; font-size: 3.5em; margin: 0 0 10px 0; font-weight: 800; }
        .intro { font-size: 1.2em; color: #a0b0c0; margin-bottom: 50px; }

        /* 캐릭터 둥실둥실 */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .character-img { 
            width: 100%; max-width: 300px; border-radius: 40px; 
            animation: float 5s ease-in-out infinite; 
            box-shadow: 0 15px 35px rgba(136, 170, 255, 0.2); 
            margin-bottom: 60px;
        }

        /* 섹션 스타일 */
        .section { text-align: left; margin-top: 60px; }
        .section h3 { 
            color: #88aaff; background: #f0f6ff; padding: 10px 20px; 
            border-radius: 20px; display: inline-block; font-size: 1.4em; 
        }

        .orthographic-view img { 
            width: 100%; border-radius: 30px; border: 3px solid #f0f6ff; 
            background: #fafcfd; margin-top: 20px;
        }

        /* 갤러리 아이템 */
        .gallery-item { 
            background: white; border-radius: 40px; padding: 30px; 
            border: 2px solid #f0f6ff; margin-top: 35px;
            transition: transform 0.3s;
        }
        .gallery-item:hover { transform: translateY(-10px); }
        .gallery-item img { width: 100%; border-radius: 25px; margin-bottom: 15px; }
        .tag { 
            background: #f0f6ff; color: #88aaff; padding: 5px 15px; 
            border-radius: 12px; font-weight: bold; font-size: 0.8em; 
        }
        .audio-player { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div class="star s1"></div><div class="star s2"></div>
    <div class="star s3"></div><div class="star s4"></div>

    <div class="container">
        <h1>Echo-mo</h1>
        <p class="intro">소리를 수집하는 말랑한 음악가</p>
        
        <img src="echomo.jpg" alt="메인 에코모" class="character-img">

        <div class="section">
            <h3>🎼 캐릭터 소개</h3>
            <p>에코모는 하얀 모찌 같은 외형을 가진 <strong>밤의 음악가</strong>입니다. 헤드폰으로 세상의 소리를 모아 위로를 전하는 음악을 만듭니다.</p>
        </div>

        <div class="section">
            <h3>🎼 캐릭터 삼면도</h3>
            <div class="orthographic-view">
                <img src="three_view.jpg" alt="에코모 설계도">
            </div>
        </div>

        <div class="section">
            <h3>🎼 소리 수집 갤러리</h3>
            
            <div class="gallery-item">
                <span class="tag">CITY</span>
                <img src="city.jpg" alt="도시">
                <p><strong>도시의 심장 소리</strong></p>
                <audio class="audio-player" controls>
                    <source src="city.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="gallery-item">
                <span class="tag">FOREST</span>
                <img src="forest.jpg" alt="숲">
                <p><strong>자연의 자장가</strong></p>
                <audio class="audio-player" controls>
                    <source src="forest.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="gallery-item">
                <span class="tag">RETRO</span>
                <img src="retro.jpg" alt="레트로">
                <p><strong>추억의 메아리</strong></p>
                <audio class="audio-player" controls>
                    <source src="retro.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>
</body>
</html>
